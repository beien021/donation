<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數據詳情 | 柯建銘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="p-8">
        <a href="index.html" class="text-[10px] font-black tracking-[0.3em] text-amber-500">← BACK TO SYSTEM</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <!-- Ranking Summary -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-20">
            <div class="lg:col-span-1">
                <h1 class="text-6xl font-black text-white mb-4">柯建銘</h1>
                <p class="text-slate-500 tracking-widest font-light">新竹市 | 民主進步黨</p>
            </div>
            <div class="grid grid-cols-3 lg:col-span-3 gap-6">
                <div class="data-card p-8 rounded-2xl text-center">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2">Total Rank</p>
                    <p class="text-4xl font-mono text-amber-500 font-black">#01</p>
                </div>
                <div class="data-card p-8 rounded-2xl text-center">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2">In Party</p>
                    <p class="text-4xl font-mono text-white font-black">#01</p>
                </div>
                <div class="data-card p-8 rounded-2xl text-center">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2">Constituency</p>
                    <p class="text-4xl font-mono text-white font-black">#01</p>
                </div>
            </div>
        </div>

        <!-- 捐款細目 Table -->
        <section class="data-card rounded-2xl overflow-hidden shadow-2xl">
            <div class="px-10 py-8 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <h2 class="text-sm font-black uppercase tracking-widest text-amber-500">Detailed Contribution / 捐款細目</h2>
                <span class="text-[10px] text-slate-500">SORT BY AMOUNT ↓</span>
            </div>
            <div class="p-10">
                <table class="w-full text-left font-mono">
                    <thead class="text-slate-600 text-xs uppercase border-b border-white/5">
                        <tr>
                            <th class="pb-6">Contributor</th>
                            <th class="pb-6">Amount</th>
                            <th class="pb-6 text-right">Percentage</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                            <td class="py-8 font-sans text-white font-bold">某大營造集團</td>
                            <td class="py-8 text-amber-500 font-bold">$2,000,000</td>
                            <td class="py-8 text-right text-slate-400">3.8%</td>
                        </tr>
                        <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                            <td class="py-8 font-sans text-white font-bold">XX 土地投資開發</td>
                            <td class="py-8 text-amber-500 font-bold">$1,500,000</td>
                            <td class="py-8 text-right text-slate-400">2.9%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
