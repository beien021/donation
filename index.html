<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Candidate Profile | 數據透視</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 確保這一行路徑正確，這是你要求的分離 .css -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-8">

    <nav class="mb-12">
        <a href="index.html" class="text-amber-500 font-bold tracking-widest text-xs uppercase">← Back to System</a>
    </nav>

    <main class="max-w-5xl mx-auto">
        <!-- 1. Ranking Summary -->
        <section class="mb-16">
            <h1 class="text-5xl font-black text-white mb-8">柯建銘</h1>
            <div class="ranking-grid">
                <div class="rank-card highlight">
                    <p class="text-xs text-slate-500 uppercase mb-2">Total Rank</p>
                    <div class="rank-value">#01</div>
                </div>
                <div class="rank-card">
                    <p class="text-xs text-slate-500 uppercase mb-2">In Party</p>
                    <div class="rank-value">#01</div>
                </div>
                <div class="rank-card">
                    <p class="text-xs text-slate-500 uppercase mb-2">Constituency</p>
                    <div class="rank-value">#01</div>
                </div>
            </div>
        </section>

        <!-- 2. 捐款細目 -->
        <section class="bg-black/40 p-8 rounded-3xl border border-white/5">
            <h2 class="text-lg font-bold mb-8 border-b border-white/10 pb-4">捐款細目 / Detailed Contribution</h2>
            <table class="donation-table">
                <thead>
                    <tr class="text-xs text-slate-500 uppercase">
                        <th class="text-left pb-4">Contributor</th>
                        <th class="text-left pb-4">Amount</th>
                        <th class="text-right pb-4">Share</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="font-bold">某大營造開發集團</td>
                        <td class="text-amber-500 font-mono font-bold">$2,000,000</td>
                        <td class="text-right text-slate-400">3.8%</td>
                    </tr>
                    <tr>
                        <td class="font-bold">XX 土地投資公司</td>
                        <td class="text-amber-500 font-mono font-bold">$1,500,000</td>
                        <td class="text-right text-slate-400">2.9%</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

</body>
</html>
