<!-- 將這段內嵌在 <head> 裡，絕對不會再變白底 -->
<style>
    :root { --bg: #050505; --gold: #fbbf24; }
    body { background: var(--bg) !important; color: #d4d4d8; font-family: sans-serif; }
    .ranking-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 2rem 0; }
    .rank-card { background: #111; border: 1px solid #333; padding: 1.5rem; border-radius: 1rem; text-align: center; }
    .rank-card.highlight { border-top: 3px solid var(--gold); }
    .gold-text { color: var(--gold); font-weight: 900; font-size: 2rem; }
</style>

<!-- HTML 結構 -->
<div class="ranking-grid">
    <div class="rank-card highlight">
        <p>Total Rank</p>
        <div class="gold-text">#01</div>
    </div>
    <div class="rank-card">
        <p>In Party</p>
        <div class="gold-text">#01</div>
    </div>
    <div class="rank-card">
        <p>Constituency</p>
        <div class="gold-text">#01</div>
    </div>
</div>
