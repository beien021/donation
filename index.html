<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金權筆記 | 數據透明化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <!-- 引入 PapaParse 用來讀取 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        /* 隱藏彈窗 */
        #dataModal { display: none; }
        .modal-content { max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <header class="hero-gradient text-white pt-20 pb-24 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl md:text-5xl font-bold mb-6">揭開政治帳本</h1>
            <p class="text-slate-400 mb-10">點擊下方按鈕，直接在網頁查閱數據明細。</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="space-y-6">
            <!-- 候選人卡片 -->
            <div class="bg-white border rounded-2xl p-6 flex justify-between items-center shadow-sm">
                <div>
                    <h3 class="text-xl font-bold">所有候選人獻金總覽</h3>
                    <p class="text-sm text-slate-400">來源檔案：A05_basic_all.csv</p>
                </div>
                <button onclick="openModal()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">
                    立即開啟數據明細
                </button>
            </div>
        </div>
    </main>

    <!-- 數據彈出視窗 (Modal) -->
    <div id="dataModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80">
        <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold">A05 屆次政治獻金明細</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-bold">&times;</button>
            </div>
            
            <div class="p-6 modal-content">
                <div id="loading" class="text-center py-10 text-slate-500">數據加載中...</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse" id="csvTable">
                        <!-- 數據會在這裡生成 -->
                    </table>
                </div>
            </div>
            
            <div class="p-4 border-t bg-slate-50 text-right">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg font-bold">關閉視窗</button>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://raw.githubusercontent.com/beien021/donation/main/A05_basic_all.csv';

        function openModal() {
            document.getElementById('dataModal').style.display = 'flex';
            // 讀取 CSV
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    displayData(results.data);
                }
            });
        }

        function closeModal() {
            document.getElementById('dataModal').style.display = 'none';
        }

        function displayData(data) {
            const table = document.getElementById('csvTable');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';
            table.innerHTML = '';

            if (data.length > 0) {
                // 產生表頭
                let headerRow = '<tr class="border-b-2 border-slate-200">';
                Object.keys(data[0]).forEach(key => {
                    headerRow += `<th class="py-3 px-4 text-sm font-bold text-slate-600">${key}</th>`;
                });
                headerRow += '</tr>';
                table.innerHTML += headerRow;

                // 產生內容 (前 100 筆以確保速度)
                data.slice(0, 100).forEach(row => {
                    let htmlRow = '<tr class="border-b border-slate-100 hover:bg-slate-50 transition">';
                    Object.values(row).forEach(val => {
                        htmlRow += `<td class="py-3 px-4 text-sm text-slate-600">${val || ''}</td>`;
                    });
                    htmlRow += '</tr>';
                    table.innerHTML += htmlRow;
                });
            }
        }
    </script>
</body>
</html>
