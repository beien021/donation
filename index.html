<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金權筆記 | 資本與權力的深度掃描</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <!-- [Section 1] Hero 敘事 -->
    <section class="min-h-screen flex flex-col justify-center items-center px-6 text-center">
        <div class="max-w-4xl">
            <span class="text-gold font-black tracking-[0.5em] text-xs uppercase mb-4 block">Special Investigation Report</span>
            <h1 class="text-5xl md:text-7xl font-black text-white mb-8 leading-tight">
                誰在資助我們的民主？<br><span class="text-gold">追蹤權力的金錢軌跡</span>
            </h1>
            <p class="text-slate-500 text-xl mb-12 leading-relaxed font-light">
                本專題透過對 202X 年度數萬筆政治獻金數據的解構，揭示特定產業如何透過資本佈局影響區域決策。這不僅是數字，更是隱形的政治版圖。
            </p>

            <!-- [Section 2] 搜尋入口 (CTA) -->
            <div class="relative max-w-2xl mx-auto mb-6">
                <input type="text" placeholder="搜尋候選人、政黨或捐款企業..." 
                       class="search-input w-full py-5 px-8 rounded-full text-lg">
                <button class="btn-gold absolute right-2 top-2 px-8 py-3 rounded-full">探索數據</button>
            </div>

            <!-- [Section 3] 範例查詢 -->
            <div class="flex flex-wrap justify-center gap-3">
                <span class="text-slate-600 text-sm py-2">熱門搜尋：</span>
                <a href="#" class="text-xs border border-white/10 px-4 py-2 rounded-full hover:border-amber-500 hover:text-gold">#半導體大廠捐款</a>
                <a href="#" class="text-xs border border-white/10 px-4 py-2 rounded-full hover:border-amber-500 hover:text-gold">#建築營造政治獻金</a>
                <a href="#" class="text-xs border border-white/10 px-4 py-2 rounded-full hover:border-amber-500 hover:text-gold">#單票成本排行</a>
            </div>
        </div>
    </section>

    <!-- [Section 4] 編輯精選案例 -->
    <section class="max-w-7xl mx-auto px-6 py-24 border-t border-white/5">
        <h2 class="text-xs font-black text-slate-500 tracking-[0.3em] uppercase mb-12">Editor's Picks / 編輯精選</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 案例卡片 -->
            <div class="data-card p-8 rounded-2xl cursor-pointer" onclick="goToCandidate()">
                <div class="flex justify-between mb-6">
                    <span class="text-[10px] bg-amber-500/10 text-amber-500 px-2 py-1 rounded">資本集中度極高</span>
                    <span class="font-mono text-xs">Case #001</span>
                </div>
                <h3 class="text-2xl font-bold text-white mb-2">柯建銘</h3>
                <p class="text-slate-500 text-sm mb-6">分析其資金如何與新竹科學園區之能源、土地開發案深度連結。</p>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px] uppercase text-slate-600">總金額</p>
                        <p class="text-xl font-mono font-bold text-gold">$51,641,147</p>
                    </div>
                    <span class="text-xs text-white underline font-bold tracking-widest">READ MORE</span>
                </div>
            </div>
            <!-- 重複結構可加入更多精選... -->
        </div>
    </section>

    <!-- 腳註 -->
    <footer class="py-12 text-center text-slate-700 text-[10px] tracking-[0.5em] uppercase">
        © 2026 Data Journalism Project - Group B4
    </footer>

    <script>
        function goToCandidate() {
            window.location.href = 'candidate.html';
        }
    </script>
</body>
</html>
