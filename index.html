<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金權筆記 | 數據推論專題</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .hidden { display: none; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="antialiased">

    <!-- [區塊 1]：原本的首頁畫面 -->
    <div id="homePage">
        <header class="hero-gradient text-white pt-24 pb-28 px-6 text-center">
            <div class="max-w-4xl mx-auto">
                <span class="inline-block px-3 py-1 bg-blue-600 text-xs font-bold rounded-full mb-4 uppercase tracking-widest">數據新聞專題</span>
                <h1 class="text-3xl md:text-5xl font-bold mb-6">揭開政治帳本：誰在影響你的代議士？</h1>
                <p class="text-slate-400 text-lg mb-10 max-w-2xl mx-auto">透過數據演算法，推論企業捐贈與政策走向的隱形關聯。</p>
                <div class="relative max-w-xl mx-auto">
                    <input type="text" placeholder="搜尋候選人..." class="w-full py-4 px-6 rounded-xl text-slate-900 text-lg shadow-2xl focus:ring-4 focus:ring-blue-500 outline-none">
                    <button class="absolute right-2 top-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold transition">搜尋</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-16">
            <h2 class="text-2xl font-bold text-slate-800 mb-8 text-center">重點候選人數據分析</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 柯建銘卡片 -->
                <div class="bg-white border border-slate-200 rounded-3xl p-8 card-hover shadow-sm">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">數據已就緒</span>
                            <h3 class="text-2xl font-bold text-slate-800 mt-2">柯建銘</h3>
                            <p class="text-slate-500 text-sm">新竹市 | 民主進步黨</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 uppercase font-bold tracking-tighter">總收入推估</p>
                            <p class="text-2xl font-mono font-bold text-slate-700">$51.6M</p>
                        </div>
                    </div>
                    <button onclick="showDetails('柯建銘', '51,641,147', '營利事業捐贈佔比極高', '營造、能源、金融', '建議觀察相關法案表決趨勢')" 
                            class="w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-blue-600 transition">
                        查看推論數據
                    </button>
                </div>

                <!-- 邱志偉卡片 -->
                <div class="bg-white border border-slate-200 rounded-3xl p-8 card-hover shadow-sm">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">數據已就緒</span>
                            <h3 class="text-2xl font-bold text-slate-800 mt-2">邱志偉</h3>
                            <p class="text-slate-500 text-sm">高雄市 | 民主進步黨</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 uppercase font-bold tracking-tighter">總收入推估</p>
                            <p class="text-2xl font-mono font-bold text-slate-700">$38.6M</p>
                        </div>
                    </div>
                    <button onclick="showDetails('邱志偉', '38,603,507', '地方產業支持度顯著', '鋼鐵、物流、精密機械', '資金集中於特定產業公會')" 
                            class="w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-blue-600 transition">
                        查看推論數據
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- [區塊 2]：點擊後顯示的詳細推論頁面 -->
    <div id="detailPage" class="hidden min-h-screen bg-slate-50">
        <nav class="bg-white border-b px-6 py-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <button onclick="backToHome()" class="text-slate-600 hover:text-blue-600 font-bold flex items-center">
                    ← 返回總覽
                </button>
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">數據推論專題</span>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6 py-12">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div class="hero-gradient p-12 text-white">
                    <h2 id="detailName" class="text-4xl font-bold mb-2">候選人姓名</h2>
                    <p id="detailAmount" class="text-2xl font-mono opacity-80">$0,000,000</p>
                </div>
                
                <div class="p-10 space-y-12">
                    <!-- 推論 1 -->
                    <section>
                        <h4 class="text-blue-600 font-bold uppercase tracking-widest text-sm mb-4">核心資金結構推論</h4>
                        <div class="bg-slate-50 p-6 rounded-2xl border-l-4 border-blue-500">
                            <p id="inference1" class="text-xl text-slate-700 leading-relaxed font-bold"></p>
                        </div>
                    </section>

                    <!-- 推論 2 -->
                    <section>
                        <h4 class="text-orange-600 font-bold uppercase tracking-widest text-sm mb-4">主要影響力來源</h4>
                        <div class="flex flex-wrap gap-3">
                            <span id="tag1" class="px-6 py-3 bg-orange-50 text-orange-700 rounded-full font-bold"></span>
                            <span id="tag2" class="px-6 py-3 bg-orange-50 text-orange-700 rounded-full font-bold"></span>
                            <span id="tag3" class="px-6 py-3 bg-orange-50 text-orange-700 rounded-full font-bold"></span>
                        </div>
                    </section>

                    <!-- 推論 3 -->
                    <section>
                        <h4 class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-4">專家評估結論</h4>
                        <p id="inferenceConclusion" class="text-lg text-slate-600 italic border-t pt-6"></p>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-slate-900 text-slate-500 py-12 text-center text-sm">
        <p>© 2026 金權筆記 | 數據推論僅供新聞研究參考</p>
    </footer>

    <script>
        function showDetails(name, amount, inf1, tags, conclusion) {
            // 切換畫面
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('detailPage').classList.remove('hidden');
            window.scrollTo(0,0);

            // 填入內容
            document.getElementById('detailName').innerText = name;
            document.getElementById('detailAmount').innerText = '$' + amount;
            document.getElementById('inference1').innerText = inf1;
            
            // 處理標籤
            const tagArray = tags.split('、');
            document.getElementById('tag1').innerText = tagArray[0] || '';
            document.getElementById('tag2').innerText = tagArray[1] || '';
            document.getElementById('tag3').innerText = tagArray[2] || '';
            
            document.getElementById('inferenceConclusion').innerText = conclusion;
        }

        function backToHome() {
            document.getElementById('detailPage').classList.add('hidden');
            document.getElementById('homePage').classList.remove('hidden');
        }
    </script>
</body>
</html>
