<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政治獻金透明化資料庫 | 數據分析平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-blue: #0a192f;
            --navy: #112240;
            --blue: #1f6feb;
            --gold: #f1c40f;
            --text-gray: #8892b0;
            --text-light: #e6f1ff;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--dark-blue);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* 導覽列 */
        nav {
            background-color: rgba(10, 25, 47, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
        }

        .logo span { color: var(--blue); }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        /* Top 3 核心指標區 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--navy);
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid var(--blue);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-card h3 {
            color: var(--text-gray);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--gold);
        }

        .stat-card .trend {
            font-size: 0.85rem;
            margin-top: 10px;
            color: #4cd137;
        }

        /* 排行榜與列表 */
        .content-section {
            background: var(--navy);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--blue);
            display: inline-block;
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            color: var(--text-gray);
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: var(--blue);
            color: white;
        }

        /* 深度分析標籤 */
        .analysis-badge {
            background: rgba(241, 196, 15, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            table { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">TRANSPARENCY<span>.TW</span></a>
        <div>
            <i class="fas fa-search" style="cursor:pointer; margin-right: 20px;"></i>
            <i class="fas fa-bars" style="cursor:pointer;"></i>
        </div>
    </nav>

    <div class="container">
        <!-- 核心指標 -->
        <section class="stats-grid">
            <div class="stat-card">
                <h3>資金集中度指數 (Gini)</h3>
                <div class="value">0.72</div>
                <div class="trend"><i class="fas fa-arrow-up"></i> 比上屆提升 5.2%</div>
            </div>
            <div class="stat-card">
                <h3>平均企業依賴率</h3>
                <div class="value">42.8%</div>
                <div class="trend" style="color: #ff4757;"><i class="fas fa-exclamation-triangle"></i> 地產開發業佔比最高</div>
            </div>
            <div class="stat-card">
                <h3>小額捐款參與度</h3>
                <div class="value">12,405 <span>筆</span></div>
                <div class="trend"><i class="fas fa-users"></i> 創歷史新高</div>
            </div>
        </section>

        <!-- 數據列表 -->
        <section class="content-section">
            <h2>候選人政治獻金分析表</h2>
            <table>
                <thead>
                    <tr>
                        <th>候選人</th>
                        <th>所屬政黨</th>
                        <th>總收入 (NTD)</th>
                        <th>企業佔比</th>
                        <th>深度分析</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>王大明</strong></td>
                        <td><span class="tag">藍天黨</span></td>
                        <td>$45,200,000</td>
                        <td>58%</td>
                        <td><span class="analysis-badge">地產關聯高</span></td>
                    </tr>
                    <tr>
                        <td><strong>李小華</strong></td>
                        <td><span class="tag" style="background: #27ae60;">大地黨</span></td>
                        <td>$22,100,000</td>
                        <td>12%</td>
                        <td><span class="analysis-badge">群眾募資型</span></td>
                    </tr>
                    <tr>
                        <td><strong>陳阿龍</strong></td>
                        <td><span class="tag" style="background: #8e44ad;">紫色力量</span></td>
                        <td>$31,500,000</td>
                        <td>45%</td>
                        <td><span class="analysis-badge">都市重劃利害</span></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- 說明區 -->
        <footer style="text-align: center; color: var(--text-gray); font-size: 0.8rem; margin-top: 50px; padding-bottom: 30px;">
            <p>© 2026 政治獻金透明化專案小組 | 數據來源：監察院公開資料</p>
        </footer>
    </div>

</body>
</html>
