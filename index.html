<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金權筆記 | 政治獻金透明化專題</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .data-card { transition: all 0.3s ease; }
        .data-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .candidate-img { width: 64px; height: 64px; object-fit: cover; border-radius: 9999px; border: 2px solid #e2e8f0; }
    </style>
</head>
<body class="antialiased">

    <!-- 頂部區塊：調整 Padding 確保不被遮擋 -->
    <header class="hero-gradient text-white pt-24 pb-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <span class="inline-block px-3 py-1 bg-blue-600 text-xs font-bold rounded-full mb-4 uppercase tracking-wider">新聞專題：202X 政治獻金解析</span>
            <h1 class="text-3xl md:text-5xl font-bold mb-6">揭開政治帳本：誰在影響你的代議士？</h1>
            <p class="text-slate-400 text-lg mb-10 max-w-2xl mx-auto">
                透過數據看見企業、政黨與候選人之間的金流網絡。
            </p>
            
            <div class="relative max-w-xl mx-auto">
                <input type="text" placeholder="搜尋候選人..." class="w-full py-4 px-6 rounded-xl text-slate-900 text-lg shadow-2xl focus:ring-4 focus:ring-blue-500 outline-none">
                <button class="absolute right-2 top-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold transition">搜尋</button>
            </div>
        </div>
    </header>

    <!-- 主內容區：移除負邊距，解決疊加問題 -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 卡片 1 -->
            <div class="bg-white p-6 rounded-2xl shadow-md data-card border-t-4 border-orange-500">
                <h4 class="text-slate-400 text-xs font-bold uppercase mb-2">編輯精選：吸金力排行</h4>
                <div class="text-3xl font-mono font-bold text-slate-800">$51,641,147</div>
                <a href="A05_basic_all.csv" class="mt-4 inline-flex items-center text-blue-600 font-bold text-sm hover:underline">
                    查看完整名單 →
                </a>
            </div>
            <!-- 卡片 2 -->
            <div class="bg-white p-6 rounded-2xl shadow-md data-card border-t-4 border-blue-500">
                <h4 class="text-slate-400 text-xs font-bold uppercase mb-2">結構分析：營利事業</h4>
                <div class="text-3xl font-mono font-bold text-slate-800">55.03%</div>
                <a href="A05_basic_all.csv" class="mt-4 inline-flex items-center text-blue-600 font-bold text-sm hover:underline">
                    分析產業流向 →
                </a>
            </div>
            <!-- 卡片 3 -->
            <div class="bg-white p-6 rounded-2xl shadow-md data-card border-t-4 border-green-500">
                <h4 class="text-slate-400 text-xs font-bold uppercase mb-2">民主透明度</h4>
                <div class="text-3xl font-mono font-bold text-slate-800">14.2%</div>
                <a href="A05_basic_all.csv" class="mt-4 inline-flex items-center text-blue-600 font-bold text-sm hover:underline">
                    閱讀匿名風險報導 →
                </a>
            </div>
        </div>

        <!-- 列表部分 -->
        <section class="mt-16">
            <h2 class="text-2xl font-bold text-slate-800 mb-8">重點候選人分析</h2>
            <div class="space-y-4">
                
                <!-- 柯建銘 -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 flex flex-wrap md:flex-nowrap justify-between items-center hover:border-blue-400 transition-all">
                    <div class="flex items-center space-x-4 w-full md:w-1/3">
                        <img src="https://www.ly.gov.tw/Images/Legislators/10014.jpg" alt="柯建銘" class="candidate-img">
                        <div>
                            <span class="text-xs font-bold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded">當選</span>
                            <h3 class="text-xl font-bold text-slate-800">柯建銘</h3>
                            <p class="text-sm text-slate-400">新竹市 | 民主進步黨</p>
                        </div>
                    </div>
                    <div class="w-1/2 md:w-1/4 mt-4 md:mt-0">
                        <p class="text-xs text-slate-400 font-bold uppercase">總收入</p>
                        <p class="text-lg font-mono font-bold text-slate-700">$51,641,147</p>
                    </div>
                    <div class="w-full md:w-auto mt-6 md:mt-0">
                        <a href="A05_basic_all.csv" class="inline-block w-full md:w-auto text-center px-8 py-3 bg-slate-900 text-white text-sm font-bold rounded-xl hover:bg-blue-600 transition shadow-md">
                            查看金主明細
                        </a>
                    </div>
                </div>

                <!-- 邱志偉 -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 flex flex-wrap md:flex-nowrap justify-between items-center hover:border-blue-400 transition-all">
                    <div class="flex items-center space-x-4 w-full md:w-1/3">
                        <img src="https://www.ly.gov.tw/Images/Legislators/10041.jpg" alt="邱志偉" class="candidate-img">
                        <div>
                            <span class="text-xs font-bold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded">當選</span>
                            <h3 class="text-xl font-bold text-slate-800">邱志偉</h3>
                            <p class="text-sm text-slate-400">高雄市 | 民主進步黨</p>
                        </div>
                    </div>
                    <div class="w-1/2 md:w-1/4 mt-4 md:mt-0">
                        <p class="text-xs text-slate-400 font-bold uppercase">總收入</p>
                        <p class="text-lg font-mono font-bold text-slate-700">$38,603,507</p>
                    </div>
                    <div class="w-full md:w-auto mt-6 md:mt-0">
                        <a href="A05_basic_all.csv" class="inline-block w-full md:w-auto text-center px-8 py-3 bg-slate-900 text-white text-sm font-bold rounded-xl hover:bg-blue-600 transition shadow-md">
                            查看金主明細
                        </a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer class="bg-slate-900 text-slate-500 py-12 text-center text-sm">
        <p>© 2026 金權筆記公民媒體專題 | 資料來源：監察院</p>
    </footer>

</body>
</html>
